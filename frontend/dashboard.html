<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Egg Market Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">
        <h4 class="text-white">🥚 Egg Market</h4>
        <hr>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a href="#" class="nav-link text-white" onclick="loadPage('dashboard')">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </li>

            <li class="nav-item farmer">
                <a href="#" class="nav-link text-white" onclick="loadPage('products')">
                    <i class="bi bi-box"></i> Manage Products
                </a>
            </li>

            <li class="nav-item farmer">
                <a href="#" class="nav-link text-white" onclick="loadPage('orders')">
                    <i class="bi bi-cart"></i> Orders
                </a>
            </li>

            <li class="nav-item admin">
                <a href="#" class="nav-link text-white" onclick="loadPage('users')">
                    <i class="bi bi-people"></i> Users
                </a>
            </li>

            <li class="nav-item">
                <a href="#" class="nav-link text-white" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </li>

        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content p-4 w-100">

        <!-- TOP BAR -->
        <div class="d-flex justify-content-between mb-4">
            <h3 id="page-title">Dashboard</h3>
            <span id="user-name">Welcome, User</span>
        </div>

        <!-- DYNAMIC CONTENT -->
        <div id="main-content"></div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
